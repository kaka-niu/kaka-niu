<svg xmlns="http://www.w3.org/2000/svg" width="500" height="270" viewBox="0 0 500 270">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="header" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1f6feb"/>
      <stop offset="100%" stop-color="#58a6ff"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- 背景卡片 -->
  <rect x="10" y="10" width="480" height="250" rx="12" fill="url(#bg)" stroke="#30363d" stroke-width="1.5"/>

  <!-- 标题栏 -->
  <rect x="10" y="10" width="480" height="40" rx="12" fill="url(#header)" opacity="0.15"/>
  <rect x="10" y="38" width="480" height="12" fill="url(#header)" opacity="0.15"/>

  <!-- 标题文字 -->
  <text x="250" y="36" text-anchor="middle" fill="#58a6ff" font-family="'Fira Code','Cascadia Code',monospace" font-size="14" font-weight="bold">👤 kaka.cfg</text>

  <!-- 行分隔线 -->
  <line x1="30" y1="62" x2="470" y2="62" stroke="#30363d" stroke-width="0.5" opacity="0.5"/>
  <line x1="30" y1="102" x2="470" y2="102" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="142" x2="470" y2="142" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="182" x2="470" y2="182" stroke="#30363d" stroke-width="0.5" opacity="0.3"/>
  <line x1="30" y1="222" x2="470" y2="222" stroke="#30363d" stroke-width="0.5" opacity="0.1"/>

  <!-- 📍 location -->
  <text x="45" y="85" fill="#f778ba" font-family="Arial,sans-serif" font-size="18">📍</text>
  <text x="75" y="85" fill="#79c0ff" font-family="'Fira Code','Cascadia Code',monospace" font-size="13" font-weight="600">location</text>
  <text x="165" y="85" fill="#8b949e" font-family="'Fira Code',monospace" font-size="13">:</text>
  <text x="180" y="85" fill="#a5d6ff" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">四川 · 宜宾</text>

  <!-- 💼 status -->
  <text x="45" y="125" fill="#f778ba" font-family="Arial,sans-serif" font-size="18">💼</text>
  <text x="75" y="125" fill="#79c0ff" font-family="'Fira Code','Cascadia Code',monospace" font-size="13" font-weight="600">status</text>
  <text x="165" y="125" fill="#8b949e" font-family="'Fira Code',monospace" font-size="13">:</text>
  <text x="180" y="125" fill="#3fb950" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">刚入社会</text>

  <!-- 🔥 passion -->
  <text x="45" y="165" fill="#f778ba" font-family="Arial,sans-serif" font-size="18">🔥</text>
  <text x="75" y="165" fill="#79c0ff" font-family="'Fira Code','Cascadia Code',monospace" font-size="13" font-weight="600">passion</text>
  <text x="165" y="165" fill="#8b949e" font-family="'Fira Code',monospace" font-size="13">:</text>
  <text x="180" y="165" fill="#a5d6ff" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">自动化脚本</text>
  <text x="265" y="165" fill="#f0d060" font-family="'Fira Code',monospace" font-size="12">|</text>
  <text x="280" y="165" fill="#a5d6ff" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">Python</text>
  <text x="345" y="165" fill="#f0d060" font-family="'Fira Code',monospace" font-size="12">|</text>
  <text x="360" y="165" fill="#a5d6ff" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">GitHub</text>

  <!-- ⚡ fun_fact -->
  <text x="45" y="205" fill="#f778ba" font-family="Arial,sans-serif" font-size="18">⚡</text>
  <text x="75" y="205" fill="#79c0ff" font-family="'Fira Code','Cascadia Code',monospace" font-size="13" font-weight="600">fun_fact</text>
  <text x="165" y="205" fill="#8b949e" font-family="'Fira Code',monospace" font-size="13">:</text>
  <text x="180" y="205" fill="#a5d6ff" font-family="'Noto Sans SC','Microsoft YaHei',sans-serif" font-size="13">能用脚本搞定的事，绝不手动点两次</text>

  <!-- 底部装饰点 -->
  <circle cx="245" cy="248" r="3" fill="#58a6ff" opacity="0.3"/>
  <circle cx="255" cy="248" r="3" fill="#58a6ff" opacity="0.5"/>
  <circle cx="265" cy="248" r="3" fill="#58a6ff" opacity="0.3"/>

</svg>
